# ─────────────────────────────────────────────────────────────────────────────
# slurm-sinfo.conf — node / partition health
#
# `sinfo` already groups nodes by (partition, state), so you get one InfluxDB
# point per partition+state combination: how many nodes are idle, allocated,
# down, draining, etc. Same trick as squeue: "|"-delimited columns -> CSV parser.
#
# Install: copy to /etc/telegraf/telegraf.d/  then  systemctl restart telegraf
#
# Measurement: slurm_nodes
#   tags   : partition, state, gpus_per_node   (+ host, added by Telegraf)
#            (gpus_per_node = GPUs configured per node, parsed from `%G`; it's a
#             TAG, not a field, so a partition with mixed GPU counts doesn't make
#             two rows collide. Total GPUs in a group = gpus_per_node * nodes.)
#   fields : nodes        (count of nodes in this partition+state)
#            cpus_state   (Slurm's "allocated/idle/other/total" string, e.g. 24/8/0/32)
#            memory_mb    (sinfo %m as a STRING — when a (partition,state) group spans
#                          nodes of differing memory, sinfo prints a "+"-suffixed
#                          minimum like "192000+"; it can also be "N/A". Keeping it a
#                          string stops one such value from failing the parse and
#                          dropping the whole node-count scrape.)
# ─────────────────────────────────────────────────────────────────────────────
[[inputs.exec]]
  # %R=Partition %T=NodeState %D=Nodes %C=CPUs(A/I/O/T) %m=MemoryPerNode(MB) %G=GRES
  commands = ["sinfo --noheader --format=%R|%T|%D|%C|%m|%G"]
  timeout  = "10s"
  interval = "30s"
  ## If Telegraf can't find sinfo, use an absolute path above (e.g.
  ## /opt/slurm/bin/sinfo) or extend PATH for this input:
  # environment = ["PATH=/usr/bin:/usr/local/bin:/opt/slurm/bin"]

  data_format = "csv"
  csv_delimiter = "|"
  csv_header_row_count = 0
  csv_trim_space = true            # tolerate any column padding
  csv_column_names = ["partition","state","nodes","cpus_state","memory_mb","gpus_per_node"]
  csv_tag_columns  = ["partition","state","gpus_per_node"]
  csv_column_types = ["string","string","int","string","string","string"]
  name_override = "slurm_nodes"

  # [inputs.exec.tags]
  #   cluster = "my-cluster"

# Strip Slurm node-state flag suffixes (e.g. "idle*", "mixed~", "alloc#") so the
# `state` tag stays a clean base state and node counts aren't split across flag
# variants. Harmless when there's no suffix.
[[processors.regex]]
  namepass = ["slurm_nodes"]
  [[processors.regex.tags]]
    key = "state"
    pattern = "^([^*~#!%$@^]*)[*~#!%$@^]+$"
    replacement = "${1}"
  # GPUs per node from `%G` (e.g. "gpu:a100:8" -> 8). Nodes with no GPU print
  # "(null)", which the second pass turns into 0. Kept as a tag string; convert
  # with int() in Flux when you need a number (gpus_per_node * nodes).
  [[processors.regex.tags]]
    key = "gpus_per_node"
    pattern = "^.*gpu(?::[A-Za-z0-9_]+)*[:=]([0-9]+).*$"
    replacement = "${1}"
  [[processors.regex.tags]]
    key = "gpus_per_node"
    pattern = "^.*[^0-9].*$|^$"
    replacement = "0"
