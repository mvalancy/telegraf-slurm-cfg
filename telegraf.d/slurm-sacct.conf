# ─────────────────────────────────────────────────────────────────────────────
# slurm-sacct.conf — finished jobs (accounting)
#
# `sacct` reports jobs that have already ended (completed, failed, cancelled, …)
# from the Slurm accounting database. It has a built-in parsable mode
# (--parsable2) that prints "|"-delimited columns — a perfect match for the CSV
# parser. One InfluxDB point per finished job.
#
# REQUIREMENT: this needs Slurm accounting (slurmdbd) to be enabled on your
# cluster. If `sacct` prints "Slurm accounting storage is disabled", this
# collector has nothing to read — that's a cluster config, not a Telegraf issue.
#
# This queries a small rolling window (the last 6 minutes of ended jobs) every
# 5 minutes so the same job isn't re-sent forever. Tune the window/interval and
# the --state list to taste.
#
# Install: copy to /etc/telegraf/telegraf.d/  then  systemctl restart telegraf
#
# Measurement: slurm_sacct
#   tags   : partition, state, user, account, qos   (+ host, added by Telegraf)
#   fields : job_id, cpus, nodes, elapsed_sec, cpu_sec, req_mem,
#            start, end, submit, exit_code
# ─────────────────────────────────────────────────────────────────────────────
[[inputs.exec]]
  # --allocations = job-level rows (no per-step rows). RAW fields are plain
  # integers (seconds), unlike the human-formatted Elapsed/CPUTime.
  commands = ["sacct --allusers --allocations --parsable2 --noheader --starttime now-6minutes --endtime now --state=CD,F,TO,CA,NF,OOM,DL,PR --format=JobID,Partition,State,User,Account,QOS,AllocCPUS,NNodes,ElapsedRaw,CPUTimeRAW,ReqMem,Start,End,Submit,ExitCode"]
  timeout  = "20s"
  interval = "5m"

  data_format = "csv"
  csv_delimiter = "|"
  csv_header_row_count = 0
  csv_column_names = ["job_id","partition","state","user","account","qos","cpus","nodes","elapsed_sec","cpu_sec","req_mem","start","end","submit","exit_code"]
  csv_tag_columns  = ["partition","state","user","account","qos"]
  csv_column_types = ["string","string","string","string","string","string","int","int","int","int","string","string","string","string","string"]
  name_override = "slurm_sacct"

  # Optional: stamp each point at the job's END time instead of collection time,
  # so late-arriving accounting rows land at the right moment on your graphs.
  #   csv_timestamp_column = "end"
  #   csv_timestamp_format = "2006-01-02T15:04:05"
  #   csv_timezone = "Local"

  # [inputs.exec.tags]
  #   cluster = "my-cluster"
