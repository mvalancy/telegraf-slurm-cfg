# ─────────────────────────────────────────────────────────────────────────────
# slurm-sacct.conf — finished jobs (accounting)
#
# `sacct` reports jobs that have already ended (completed, failed, cancelled, …)
# from the Slurm accounting database. It has a built-in parsable mode
# (--parsable2) that prints "|"-delimited columns — a perfect match for the CSV
# parser. One InfluxDB point per finished job.
#
# REQUIREMENT: this needs Slurm accounting (slurmdbd) to be enabled on your
# cluster. If `sacct` prints "Slurm accounting storage is disabled", this
# collector has nothing to read — that's a cluster config, not a Telegraf issue.
#
# This queries a small rolling window (the last 6 minutes of ended jobs) every
# 5 minutes so the same job isn't re-sent forever. Tune the window/interval and
# the --state list to taste.
#
# Install: copy to /etc/telegraf/telegraf.d/  then  systemctl restart telegraf
#
# Measurement: slurm_accounting
#   tags   : job_id, partition, state, user, account, qos   (+ host)
#   fields : cpus, nodes, gpus, elapsed_sec, cpu_sec, req_mem, start, submit, exit_code
#            (gpus = TOTAL GPUs the job used, parsed from AllocTRES "gres/gpu=N")
#   time   : each point is stamped at the job's END time (not collection time)
# ─────────────────────────────────────────────────────────────────────────────
[[inputs.exec]]
  # --allocations = job-level rows (no per-step rows). RAW fields are plain
  # integers (seconds), unlike the human-formatted Elapsed/CPUTime.
  #
  # The `| awk` tail drops rows whose End column (field 13) isn't a real
  # timestamp. sacct can render End as "Unknown"/"None" for in-flight requeued
  # jobs (preempted/node-fail), and one such value would fail csv_timestamp_column
  # parsing and discard the ENTIRE batch. Filtering at the source drops only the
  # bad row. (Pure standard tools; the field index is the End column position.)
  commands = ['''sh -c 'sacct --allusers --allocations --parsable2 --noheader --starttime now-6minutes --endtime now --state=CD,F,TO,CA,NF,OOM,DL,PR --format=JobID,Partition,State,User,Account,QOS,AllocCPUS,NNodes,ElapsedRaw,CPUTimeRAW,ReqMem,Start,End,Submit,ExitCode,AllocTRES | awk -F"|" "\$13 ~ /^[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]T/"' ''']
  timeout  = "20s"     # raise on busy clusters; sacct can be slow
  interval = "5m"
  ## sacct must reach slurmdbd AND the telegraf user needs privilege to read
  ## OTHER users' accounting (operator/admin), or --allusers returns nothing.
  ## If telegraf can't find sacct, use an absolute path or extend PATH:
  # environment = ["PATH=/usr/bin:/usr/local/bin:/opt/slurm/bin"]

  data_format = "csv"
  csv_delimiter = "|"
  csv_header_row_count = 0
  csv_trim_space = true            # tolerate any column padding
  csv_column_names = ["job_id","partition","state","user","account","qos","cpus","nodes","elapsed_sec","cpu_sec","req_mem","start","end","submit","exit_code","gpus"]
  # job_id is a TAG so each finished job is a unique series (two jobs that share
  # partition/state/user/account/qos would otherwise collide). Send this to a
  # bucket with retention that matches how long you want job history (cardinality
  # grows with total jobs kept).
  csv_tag_columns  = ["job_id","partition","state","user","account","qos"]
  csv_column_types = ["string","string","string","string","string","string","int","int","int","int","string","string","string","string","string","string"]
  name_override = "slurm_accounting"

  # Stamp each point at the job's END time (not collection time) so finished jobs
  # land on the timeline when they actually ended. Also makes timestamps unique.
  csv_timestamp_column = "end"
  csv_timestamp_format = "2006-01-02T15:04:05"
  csv_timezone = "Local"

  # [inputs.exec.tags]
  #   cluster = "my-cluster"

# Normalize the cancelled-by-UID variant so all cancellations share one state
# value: sacct renders cancelled jobs as "CANCELLED by 1001" etc., which would
# otherwise create a distinct `state` tag per cancelling user and break
# group-by-state dashboards.
[[processors.regex]]
  namepass = ["slurm_accounting"]
  [[processors.regex.tags]]
    key = "state"
    pattern = "^CANCELLED by .*$"
    replacement = "CANCELLED"
  # GPUs: AllocTRES looks like "billing=32,cpu=32,gres/gpu=2,mem=64G,node=1".
  # Pull the gpu count, then make jobs that used no GPU 0.
  [[processors.regex.fields]]
    key = "gpus"
    pattern = "^.*gpu(?::[A-Za-z0-9_]+)*[:=]([0-9]+).*$"
    replacement = "${1}"
  [[processors.regex.fields]]
    key = "gpus"
    pattern = "^.*[^0-9].*$|^$"
    replacement = "0"

# Store gpus as an integer so GPU-hours (gpus * elapsed) plots and sums.
[[processors.converter]]
  namepass = ["slurm_accounting"]
  [processors.converter.fields]
    integer = ["gpus"]
