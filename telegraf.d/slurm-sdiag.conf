# ─────────────────────────────────────────────────────────────────────────────
# slurm-sdiag.conf — scheduler health / diagnostics
#
# `sdiag` reports how the Slurm scheduler itself is doing: how many jobs it has
# processed, how long its scheduling and backfill cycles take, RPC load, etc.
# Unlike squeue/sinfo/sacct it has no "|"-column format, but it speaks JSON, and
# its numbers are plain scalars — so Telegraf's built-in json_v2 parser reads
# them directly into one clean point. Still no scripts, still no jq.
#
# REQUIREMENT: `sdiag --json` exists on Slurm 23.02 and newer. On older Slurm
# `sdiag` only prints plain text and this collector won't work.
#
# Install: copy to /etc/telegraf/telegraf.d/  then  systemctl restart telegraf
#
# Measurement: slurm_scheduler   (one point, ~40 fields)
#   fields: server_thread_count, agent_queue_size, jobs_submitted/started/
#           completed/canceled/failed/pending/running, schedule_cycle_* (main
#           scheduler) and bf_* (backfill) timings/depths/queue lengths, …
#   tags  : host (added by Telegraf)
# ─────────────────────────────────────────────────────────────────────────────
[[inputs.exec]]
  commands = ["sdiag --json"]
  timeout  = "10s"
  interval = "30s"
  ## If Telegraf can't find sdiag, use an absolute path above (e.g.
  ## /opt/slurm/bin/sdiag) or extend PATH for this input:
  # environment = ["PATH=/usr/bin:/usr/local/bin:/opt/slurm/bin"]

  data_format = "json_v2"
  [[inputs.exec.json_v2]]
    measurement_name = "slurm_scheduler"
    [[inputs.exec.json_v2.object]]
      path = "statistics"
      # Skip the few wrapped-timestamp objects and the per-RPC arrays, so we get
      # one tidy point of scalar counters. (Add separate object blocks for
      # rpcs_by_message_type / rpcs_by_user if you want per-RPC breakdowns.)
      excluded_keys = ["req_time", "req_time_start", "job_states_ts", "bf_when_last_cycle", "rpcs_by_message_type", "rpcs_by_user"]

  # [inputs.exec.tags]
  #   cluster = "my-cluster"
