# ─────────────────────────────────────────────────────────────────────────────
# slurm-squeue.conf — current jobs in the Slurm queue (running + pending)
#
# Produces one InfluxDB point per job. `squeue` prints columns separated by "|"
# and Telegraf's built-in CSV parser turns each column into a tag or a field.
# No scripts, no JSON, no jq — this file is the whole collector.
#
# Install: copy to /etc/telegraf/telegraf.d/  then  systemctl restart telegraf
#
# Measurement: slurm_queue
#   tags   : job_id, partition, state, user, account, qos, reason   (+ host)
#   fields : cpus, nodes, gpus, priority, time_limit, time_used, nodelist
#   (gpus = GPUs PER NODE for the job, parsed from `%b` (TRES per node); the job's
#    TOTAL GPUs = gpus * nodes. job_id is a tag so each job is unique; reason is a
#    tag so you can group pending jobs by why they're waiting. Short-retention bucket.)
# ─────────────────────────────────────────────────────────────────────────────
[[inputs.exec]]
  # %i=JobID %P=Partition %T=State %u=User %a=Account %q=QOS %C=CPUs %D=Nodes
  # %Q=Priority %l=TimeLimit %M=TimeUsed %N=NodeList %r=Reason %b=GRES/node (GPUs)
  commands = ["squeue --all --noheader --format=%i|%P|%T|%u|%a|%q|%C|%D|%Q|%l|%M|%N|%r|%b"]
  timeout  = "10s"     # raise on very large clusters if squeue is slow
  interval = "30s"
  ## If Telegraf can't find squeue (Slurm often lives in /opt/slurm/bin and the
  ## telegraf systemd unit has a minimal PATH), use an absolute path above, or:
  # environment = ["PATH=/usr/bin:/usr/local/bin:/opt/slurm/bin"]

  data_format = "csv"
  csv_delimiter = "|"
  csv_header_row_count = 0
  csv_trim_space = true            # tolerate any column padding
  csv_column_names = ["job_id","partition","state","user","account","qos","cpus","nodes","priority","time_limit","time_used","nodelist","reason","gpus"]
  # job_id is a TAG: it makes every job a unique series. Without it, two jobs
  # that share partition/state/user/account/qos collide (same series+timestamp)
  # and one is lost. The cost is cardinality — so send this measurement to a
  # bucket with SHORT retention (e.g. 7-30 days) to keep the series count bounded.
  csv_tag_columns  = ["job_id","partition","state","user","account","qos","reason"]
  csv_column_types = ["string","string","string","string","string","string","int","int","int","string","string","string","string","string"]
  name_override = "slurm_queue"

  # Optional: label every point with your cluster name.
  # [inputs.exec.tags]
  #   cluster = "my-cluster"

# Keep the `reason` tag low-cardinality: some pending reasons embed a node list
# (e.g. "ReqNodeNotAvail, UnavailableNodes:node[01-20]"). Trim everything from the
# first comma so reasons collapse to a bounded set ("ReqNodeNotAvail", "Priority",
# "Resources", "Dependency", "None", ...).
[[processors.regex]]
  namepass = ["slurm_queue"]
  [[processors.regex.tags]]
    key = "reason"
    pattern = "^([^,]*),.*$"
    replacement = "${1}"
  # GPUs: `%b` prints TRES per node, e.g. "gres/gpu:2" or "gpu:a100:2" (and "N/A"
  # for non-GPU jobs). First pull out the integer GPU count; then turn anything
  # that still isn't a plain number (N/A, empty) into 0.
  [[processors.regex.fields]]
    key = "gpus"
    pattern = "^.*gpu(?::[A-Za-z0-9_]+)*[:=]([0-9]+).*$"
    replacement = "${1}"
  [[processors.regex.fields]]
    key = "gpus"
    pattern = "^.*[^0-9].*$|^$"
    replacement = "0"

# Store gpus as an integer (the regex above leaves it a string) so it plots and sums.
[[processors.converter]]
  namepass = ["slurm_queue"]
  [processors.converter.fields]
    integer = ["gpus"]
