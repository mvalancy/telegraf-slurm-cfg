# CI for telegraf-slurm-cfg — validates every collector against the bundled
# fixtures (no Slurm cluster or InfluxDB needed) and publishes the HTML report.
#
# PREPARED, NOT DEPLOYED: this runs on manual dispatch only. To turn it into
# real CI, uncomment the push / pull_request triggers below.
name: test

on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]
  # pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TELEGRAF_VERSION: "1.33.1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Telegraf
        run: |
          curl -fsSL -o telegraf.tar.gz \
            "https://dl.influxdata.com/telegraf/releases/telegraf-${TELEGRAF_VERSION}_linux_amd64.tar.gz"
          tar -xzf telegraf.tar.gz
          echo "TELEGRAF=$(find "$PWD" -type f -name telegraf | head -1)" >> "$GITHUB_ENV"

      # The real validation: run-tests.sh swaps each collector's command to read
      # the bundled fixture (so no Slurm cluster is needed) but keeps the actual
      # parser config, then checks every measurement/tag/field. It fails the job
      # if any collector's config is broken.
      - name: Run test suite (fixtures)
        run: bash test/run-tests.sh report.html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.html
