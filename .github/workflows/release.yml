# Release workflow — on a version tag (e.g. v1.0.0), build the deploy package and
# publish a GitHub Release with the zip attached.
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# That's it — the Release appears under the repo's Releases tab with
# telegraf-slurm-cfg-v1.0.0.zip (a slim README + LICENSE + telegraf.d/).
name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # also allow a manual run (uses the latest commit)

permissions:
  contents: write           # needed to create the release + upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the package zip
        run: ./build.sh "${GITHUB_REF_NAME}"

      - name: Sanity-check the zip contents
        run: |
          unzip -l dist/*.zip
          test -f dist/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          body: |
            **Drop-in Telegraf collectors for Slurm** — no scripts to maintain.

            ### Install on Linux
            Download the `.zip` below, then in a terminal:
            ```bash
            # 'unzip' not installed? add it first:
            #   Debian/Ubuntu:    sudo apt-get install -y unzip
            #   RHEL/Rocky/Alma:  sudo dnf install -y unzip      (older: sudo yum install -y unzip)
            unzip telegraf-slurm-cfg-*.zip
            cd telegraf-slurm-cfg

            # copy the collectors you want into Telegraf's drop-in config directory:
            sudo cp telegraf.d/*.conf /etc/telegraf/telegraf.d/

            # restart Telegraf so it loads them:
            sudo systemctl restart telegraf
            ```
            You also need a Telegraf **InfluxDB output** configured, and — only for
            `slurm-sacct.conf` — the telegraf user needs Slurm **operator** access:
            `sudo sacctmgr -i modify user telegraf set adminlevel=Operator`.

            Full step-by-step is in `README.md` inside the zip; ready-made
            Grafana / InfluxDB queries are in `dashboards/`. Tested live against
            Slurm 19.05 → 25.11.
