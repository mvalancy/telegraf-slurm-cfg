# Release workflow — on a version tag (e.g. v1.0.0), build the deploy package and
# publish a GitHub Release with the zip attached.
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# That's it — the Release appears under the repo's Releases tab with
# telegraf-slurm-cfg-v1.0.0.zip (a slim README + LICENSE + telegraf.d/).
name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # also allow a manual run (uses the latest commit)

permissions:
  contents: write           # needed to create the release + upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the package zip
        run: ./build.sh "${GITHUB_REF_NAME}"

      - name: Sanity-check the zip contents
        run: |
          unzip -l dist/*.zip
          test -f dist/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          body: |
            Drop-in Telegraf collectors for Slurm — copy `telegraf.d/*.conf` into
            `/etc/telegraf/telegraf.d/` and restart Telegraf. See the README inside
            the zip, or the [project README](https://github.com/mvalancy/telegraf-slurm-cfg).
